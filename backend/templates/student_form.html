{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Student | NexusSchoolERP{% endblock %}
{% block page_title %}{% if editing %}Edit Student{% else %}New Student{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" name="roll_number" value="{{ record.roll_number|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Class Name</label>
        <input type="text" name="class_name" value="{{ record.class_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Section</label>
        <input type="text" name="section" value="{{ record.section|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Parent Name</label>
        <input type="text" name="parent_name" value="{{ record.parent_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="alumni" {% if record.status == 'alumni' %}selected{% endif %}>Alumni</option>
          <option value="transferred" {% if record.status == 'transferred' %}selected{% endif %}>Transferred</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Admission Date</label>
        <input type="date" name="admission_date" value="{{ record.admission_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Student</button>
      <a href="/students/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
